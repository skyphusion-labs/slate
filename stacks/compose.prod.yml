# Production compose stack: Slate (Vivijure Screenwriter's Assistant)
#
# Config + secrets (never committed): copy stacks/.env.example to stacks/.env and
# fill it in. docker compose auto-loads stacks/.env; every value below is read by
# ${VAR} reference, so no real deployment id or secret is baked into this file.
#   Non-secret identifiers (your deployment topology):
#     DISCORD_CHANNEL_IDS      - comma-separated Discord channel IDs the bot serves
#     CF_D1_ACCOUNT_ID         - Cloudflare account ID
#     CF_D1_DATABASE_ID        - D1 database ID
#   Secrets:
#     DISCORD_TOKEN            - Discord bot token
#     STUDIO_API_TOKEN         - Vivijure Studio API token (bearer; REQUIRED)
#     CF_ACCESS_CLIENT_ID      - CF Access service token client ID (optional)
#     CF_ACCESS_CLIENT_SECRET  - CF Access service token secret (optional)
#     CF_D1_TOKEN              - CF API token with D1:Write permission
#     CF_AIG_TOKEN             - CF API token for AI Gateway (Anthropic path)
#     CF_GATEWAY_ENDPOINT      - CF AI Gateway compat URL
#     SEARCH_WORKER_URL        - slate-search Worker base URL
#     SEARCH_SECRET            - X-Search-Secret for /search + /knowledge/*
#     FETCH_SECRET             - X-Search-Secret for /fetch (required; no SEARCH_SECRET fallback)
#     MEMORY_SECRET            - X-Search-Secret for /memory/* (required; no SEARCH_SECRET fallback)
#     CF_R2_ACCESS_ID          - R2 access key (for portrait uploads via LLM API)
#     CF_R2_SECRET             - R2 secret key
#
# Claude backend (default): set CF_AIG_TOKEN + CF_GATEWAY_ENDPOINT, DISCORD_MODEL=claude-sonnet-4-6
# Ollama backend:            unset CF_AIG_TOKEN, set OLLAMA_BASE_URL + DISCORD_MODEL=<ollama model>
#
# Deploy:   ssh <deploy-user>@<deploy-host> "cd ~/dev/slate/stacks && docker compose -p slate -f compose.prod.yml up -d"
# Redeploy: ssh <deploy-user>@<deploy-host> "cd ~/dev/slate/stacks && docker compose -p slate -f compose.prod.yml up -d --force-recreate slate"
# Logs:     ssh <deploy-user>@<deploy-host> "docker compose -p slate -f ~/dev/slate/stacks/compose.prod.yml logs -f"

services:
  slate:
    image: node:24
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci --silent && node bot.mjs"
    volumes:
      - /root/dev/slate:/app
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CHANNEL_IDS: ${DISCORD_CHANNEL_IDS}
      DISCORD_MODEL: ${DISCORD_MODEL:-claude-sonnet-4-6}
      DISCORD_LOG: /dev/stdout
      VIVIJURE_API_URL: https://vivijure.skyphusion.org
      STUDIO_API_TOKEN: ${STUDIO_API_TOKEN}
      LLM_API_URL: https://play.skyphusion.org
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
      CF_D1_TOKEN: ${CF_D1_TOKEN}
      CF_D1_ACCOUNT_ID: ${CF_D1_ACCOUNT_ID}
      CF_D1_DATABASE_ID: ${CF_D1_DATABASE_ID}
      CF_AIG_TOKEN: ${CF_AIG_TOKEN:-}
      CF_GATEWAY_ENDPOINT: ${CF_GATEWAY_ENDPOINT:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      SEARCH_WORKER_URL: ${SEARCH_WORKER_URL:-}
      SEARCH_SECRET: ${SEARCH_SECRET:-}
      FETCH_SECRET: ${FETCH_SECRET:-}
      MEMORY_SECRET: ${MEMORY_SECRET:-}
      TRUSTED_BOT_IDS: ${TRUSTED_BOT_IDS:-}
      LOG_WORKER_URL: ${LOG_WORKER_URL:-}
      LOG_SECRET: ${LOG_SECRET:-}
      LOG_SERVICE: ${LOG_SERVICE:-slate}
