name = "slate-search"
main = "src/index.ts"
compatibility_date = "2025-06-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = true  # consumed door: the slate bot (SEARCH_WORKER_URL, X-Search-Secret) calls slate-search directly after the #170 cutover repointed it off the orphan vivijure-search; pin true so every deploy asserts the door OPEN (slate#51)

[browser]
binding = "BROWSER"

[ai]
binding = "AI"

[[vectorize]]
binding = "KNOWLEDGE"
index_name = "slate-knowledge"

# slate#90: auto-ingested session memory (chat/brief/traffic), separate from the manual KNOWLEDGE
# corpus above so per-channel session context never mixes into the shared !learn knowledge base.
# Create once: `npx wrangler vectorize create slate-memory --dimensions=1024 --metric=cosine`, then
# `npx wrangler vectorize create-metadata-index slate-memory --property-name=channelId --type=string`
# (powers the optional channelId filter on /memory/search).
[[vectorize]]
binding = "MEMORY"
index_name = "slate-memory"

# Secrets (set via: wrangler secret put <NAME>)
#   BRAVE_API_KEY
#   TAVILY_API_KEY
#   SEARCH_SECRET    shared token the Discord bot sends in X-Search-Secret
