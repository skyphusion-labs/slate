name = "slate-search"
main = "src/index.ts"
compatibility_date = "2025-06-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = false  # no workers.dev door; self-authenticates + reached by binding/token (defense-in-depth; fleet-chezmoi#46)

[browser]
binding = "BROWSER"

[ai]
binding = "AI"

[[vectorize]]
binding = "KNOWLEDGE"
index_name = "slate-knowledge"

# Secrets (set via: wrangler secret put <NAME>)
#   BRAVE_API_KEY
#   TAVILY_API_KEY
#   SEARCH_SECRET    shared token the Discord bot sends in X-Search-Secret
