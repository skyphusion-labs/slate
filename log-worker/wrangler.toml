name = "slate-logs"
main = "src/index.ts"
compatibility_date = "2025-06-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = true  # consumed door: slate bot on dischord posts to slate-logs.workers.dev via LOG_WORKER_URL with X-Log-Secret; pin true so every deploy asserts the door OPEN, not closed (slate#51)

[[r2_buckets]]
binding = "LOGS"
bucket_name = "slate-logs"

# Secrets (set via: wrangler secret put <NAME>)
#   LOG_SECRET    shared token services send in X-Log-Secret
