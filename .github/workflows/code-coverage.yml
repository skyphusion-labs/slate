name: Test and Native Code Coverage

# Split so fork PR code never runs with write-scoped GITHUB_TOKEN / id-token
# (preinstall / vitest compromise must not get pull-requests:write or OIDC).

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install Root Dependencies
        run: npm ci

      - name: Start Local Log Worker microservice
        run: |
          cd log-worker && npm ci --no-audit --no-fund
          npx wrangler dev --port 8787 &

      - name: Start Local Search Worker microservice
        run: |
          cd search-worker && npm ci --no-audit --no-fund
          npx wrangler dev --port 8788 &

      - name: Wait for Mesh Workers to be ready
        run: |
          echo "Waiting for background workers to settle..."
          timeout 30s bash -c 'until lsof -i :8787 -s TCP:LISTEN && lsof -i :8788 -s TCP:LISTEN; do sleep 1; done' || true

      - name: Run Bot Smoke Test with Coverage
        run: npx vitest run --coverage.enabled=true --coverage.provider=istanbul --coverage.reporter=cobertura --teardownTimeout=1

      - name: Stage coverage for upload
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: ./coverage/cobertura-coverage.xml
          if-no-files-found: error

  upload-coverage:
    needs: coverage
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      code-quality: write
      pull-requests: write
    steps:
      - name: Fetch coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-cobertura
      - name: Upload coverage report
        uses: actions/upload-code-coverage@v1
        with:
          file: ./cobertura-coverage.xml
          language: javascript
