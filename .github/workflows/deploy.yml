name: deploy

# Deploy the Cloudflare Workers for slate on a pushed version tag (v*).
#
# Scope: this repo has three runtime pieces --
#   - the Discord bot (bot.mjs), which runs as a host-side Docker stack on its
#     host (stacks/compose.prod.yml: ssh + docker compose up). NOT owned by CI.
#   - search-worker/ -> Cloudflare Worker `slate-search`
#   - log-worker/    -> Cloudflare Worker `slate-logs`
# The two Workers (committed wrangler.toml, plain `wrangler deploy`) are the
# CI-deployable pieces; the bot stays a deliberate host-side step.
#
# Runner: GitHub-hosted ubuntu-latest. PUBLIC repo. Deploy is tag-only: a bare
# merge to main NEVER redeploys the Workers. Cut a SemVer tag to ship
# (git tag -a v0.1.0 -m "..." && git push origin v0.1.0). workflow_dispatch may
# run checkout only; deploy steps are guarded with
# `if: startsWith(github.ref, 'refs/tags/v')` so a branch dispatch never ships
# (common-thread pattern). Gap 1: tag must be an ancestor of origin/main.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   -- CF API token with Workers Scripts:Edit (the
#                             workers bind Browser Rendering, Vectorize, R2).
#   CLOUDFLARE_ACCOUNT_ID  -- the Cloudflare account ID.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-slate-workers-tag
  cancel-in-progress: false

jobs:
  deploy-workers:
    name: Deploy slate workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: 22

      # search-worker has a committed package-lock.json -> npm ci.
      - name: Deploy search-worker (slate-search)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: search-worker
        run: |
          npm ci
          npm run typecheck
          npx wrangler deploy

      # log-worker has no lockfile (dev deps only) -> npm install.
      - name: Deploy log-worker (slate-logs)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: log-worker
        run: |
          npm install
          npm run typecheck
          npx wrangler deploy
